apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: corso
  namespace: corso-system
  labels:
    app: corso
    app.kubernetes.io/name: corso
    app.kubernetes.io/part-of: corso
spec:
  selector:
    matchLabels:
      app: corso
  template:
    metadata:
      labels:
        app: corso
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: corso
      hostPID: true
      hostNetwork: true
      containers:
        - name: corso
          image: corso:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN", "BPF"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CORSO_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9090
              name: metrics
              hostPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["/corso-ctl", "count"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["/corso-ctl", "count"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
      tolerations:
        - operator: Exists
