{{- if .Values.opaPolicies.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "corso.fullname" . }}-opa-allowlist-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corso.labels" . | nindent 4 }}
    {{- with .Values.opaPolicies.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  ebpf_allowlist.rego: |-
    {{- .Files.Get "optional/ebpf_allowlist.rego" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "corso.fullname" . }}-opa-enforcement-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corso.labels" . | nindent 4 }}
    {{- with .Values.opaPolicies.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  ebpf_enforcement.rego: |-
    {{- .Files.Get "optional/ebpf_enforcement.rego" | nindent 4 }}
{{- end }}