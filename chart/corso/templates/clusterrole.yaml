{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "corso.fullname" . }}
  labels:
    {{- include "corso.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["corso.io"]
    resources: ["bpfprogramallowlists"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["corso.io"]
    resources: ["bpfprogramallowlists/status"]
    verbs: ["get", "update", "patch"]
{{- end }}
