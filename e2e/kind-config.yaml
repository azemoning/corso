kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /sys/kernel/debug
        containerPath: /sys/kernel/debug
      - hostPath: /sys/fs/bpf
        containerPath: /sys/fs/bpf
      - hostPath: /proc
        containerPath: /host/proc
        readOnly: true
  - role: worker
    extraMounts:
      - hostPath: /sys/kernel/debug
        containerPath: /sys/kernel/debug
      - hostPath: /sys/fs/bpf
        containerPath: /sys/fs/bpf
      - hostPath: /proc
        containerPath: /host/proc
        readOnly: true
