apiVersion: constraints.gatekeeper.sh/v1beta1
kind: EbpfProgramAllowlist
metadata:
  name: enforce-corso-allowlist-schema
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["corso.io"]
        kinds: ["BPFProgramAllowlist"]
  parameters:
    allowedActions:
      - alert
      - block
      - audit